<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff - La Liara Balompié</title>
  <link rel="stylesheet" href="CSS/estiloEquipo.css" />
</head>
<body>

<nav>
  <div class="nav-logo-wrap" title="Inicio" onclick="window.location.href='equipo.html'">
    <img class="club-logo" src="img/logoLiara.png" alt="logo-liara" />
  </div>
  <span class="nav-sep"></span>
  <div class="nav-links">
    <a href="jugador.html">Jugadores</a>
    <a href="equipo.html">Equipos</a>
    <a href="staff.html" class="active">Staffs</a>
    <a href="partido.html">Partidos</a>
    <a href="fichaMedica.html" class="admin-only">Fichas Médicas</a>
  </div>
  <div class="nav-right"></div>
</nav>

<main>
  <div class="page-header">
    <div>
      <h1>
        <svg style="width:32px;height:32px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        STAFF
      </h1>
      <p>Administración del cuerpo técnico del club</p>
    </div>
    <button class="btn btn-primary admin-only" onclick="abrirModalCrear()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo staff
    </button>
  </div>

  <div class="search-bar">
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="busNombre" placeholder="Buscar por nombre..." />
    </div>
    <div class="field">
      <label>Cargo</label>
      <input type="text" id="busCargo" placeholder="Entrenador, Médico..." />
    </div>
    <button class="btn btn-primary" onclick="buscarStaff()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </button>
    <button class="btn btn-outline" onclick="limpiarFiltros()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Limpiar
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Cargo</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla">
        <tr>
          <td colspan="5"><div class="empty-state"><div class="icon">🧑‍💼</div><p>Pulsa Buscar para cargar el staff</p></div></td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<!-- MODAL CREAR -->
<div class="modal-overlay" id="modalCrear">
  <div class="modal">
    <button class="modal-close">✕</button>
    <h2>
      <svg style="width:20px;height:20px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:6px" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      NUEVO STAFF
    </h2>
    <div class="form-grid">
      <div class="form-field full">
        <label>Nombre <span class="req">*</span></label>
        <input type="text" id="cNombre" placeholder="Nombre completo" />
      </div>
      <div class="form-field">
        <label>Cargo <span class="req">*</span></label>
        <input type="text" id="cCargo" placeholder="Entrenador, Médico..." />
      </div>
      <div class="form-field">
        <label>Activo <span class="req">*</span></label>
        <select id="cActivo">
          <option value="true">Sí</option>
          <option value="false">No</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline">Cancelar</button>
      <button class="btn btn-primary" onclick="crearStaff()">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Crear
      </button>
    </div>
  </div>
</div>

<!-- MODAL MODIFICAR -->
<div class="modal-overlay" id="modalModificar">
  <div class="modal">
    <button class="modal-close">✕</button>
    <h2>
      <svg style="width:20px;height:20px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:6px" viewBox="0 0 24 24">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      MODIFICAR STAFF
    </h2>
    <input type="hidden" id="mId" />
    <div class="form-grid">
      <div class="form-field full">
        <label>Nombre <span class="req">*</span></label>
        <input type="text" id="mNombre" />
      </div>
      <div class="form-field">
        <label>Cargo <span class="req">*</span></label>
        <input type="text" id="mCargo" />
      </div>
      <div class="form-field">
        <label>Activo <span class="req">*</span></label>
        <select id="mActivo">
          <option value="true">Sí</option>
          <option value="false">No</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline">Cancelar</button>
      <button class="btn btn-primary" onclick="ejecutarModificar()">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Guardar cambios
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg"></span></div>
<script src="JS/scriptStaff.js"></script>
</body>
</html>
