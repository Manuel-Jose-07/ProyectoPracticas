<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jugadores - La Liara Balompié</title>
  <link rel="stylesheet" href="CSS/estiloEquipo.css" />
</head>
<body>

<nav>
  <div class="nav-logo-wrap" title="Inicio" onclick="window.location.href='equipo.html'">
    <img class="club-logo" src="img/logoLiara.png" alt="logo-liara" />
  </div>
  <span class="nav-sep"></span>
  <div class="nav-links">
    <a href="jugador.html" class="active">Jugadores</a>
    <a href="equipo.html">Equipos</a>
    <a href="staff.html">Staffs</a>
    <a href="partido.html">Partidos</a>
    <a href="fichaMedica.html" class="admin-only">Fichas Médicas</a>
    <a href="usuario.html" class="admin-only">Usuarios</a>
    <a href="jugadorPartido.html" class="admin-only">Jugador-Partido</a>
    <a href="staffEquipo.html" class="admin-only">Staff-Equipo</a>
  </div>
  <div class="nav-right"></div>
</nav>

<main>
  <div class="page-header">
    <div>
      <h1>
        <svg style="width:32px;height:32px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        JUGADORES
      </h1>
      <p>Administración de jugadores del club</p>
    </div>
    <button class="btn btn-primary admin-only" onclick="abrirModalCrear()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo jugador
    </button>
  </div>

  <div class="search-bar">
    <div class="field">
      <label>Nombre jugador</label>
      <input type="text" id="busNombre" placeholder="Ej: Antonio García..." />
    </div>
    <div class="field">
      <label>Nombre equipo</label>
      <input type="text" id="busEquipoNombre" placeholder="Ej: Alevín A..." />
    </div>
    <button class="btn btn-primary" onclick="buscarJugadores()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </button>
    <button class="btn btn-outline" onclick="limpiarFiltros()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Limpiar
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Equipo</th>
          <th>F. Nacimiento</th>
          <th>Posición</th>
          <th>Dorsal</th>
          <th>Score</th>
          <th>Estado</th>
          <th class="admin-only">Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla">
        <tr>
          <td colspan="8"><div class="empty-state"><div class="icon">⚽</div><p>Pulsa Buscar para cargar los jugadores</p></div></td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<!-- MODAL CREAR -->
<div class="modal-overlay" id="modalCrear">
  <div class="modal">
    <button class="modal-close">✕</button>
    <h2>NUEVO JUGADOR</h2>
    <div class="form-grid">
      <div class="form-field">
        <label>Nombre <span class="req">*</span></label>
        <input type="text" id="cNombre" placeholder="Nombre completo" />
      </div>
      <div class="form-field">
        <label>ID Equipo <span class="req">*</span></label>
        <input type="number" id="cEquipo" placeholder="ID del equipo" />
      </div>
      <div class="form-field">
        <label>Fecha Nacimiento <span class="req">*</span></label>
        <input type="date" id="cFecha" />
      </div>
      <div class="form-field">
        <label>Posición</label>
        <input type="text" id="cPosicion" placeholder="Portero, Delantero..." />
      </div>
      <div class="form-field">
        <label>Dorsal</label>
        <input type="number" id="cDorsal" placeholder="1–99" />
      </div>
      <div class="form-field">
        <label>Score</label>
        <input type="number" id="cScore" step="0.01" placeholder="0.00" />
      </div>
      <div class="form-field">
        <label>Activo <span class="req">*</span></label>
        <select id="cActivo"><option value="true">Sí</option><option value="false">No</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline">Cancelar</button>
      <button class="btn btn-primary" onclick="crearJugador()">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Crear jugador
      </button>
    </div>
  </div>
</div>

<!-- MODAL MODIFICAR -->
<div class="modal-overlay" id="modalModificar">
  <div class="modal">
    <button class="modal-close">✕</button>
    <h2>MODIFICAR JUGADOR</h2>
    <input type="hidden" id="mId" />
    <div class="form-grid">
      <div class="form-field">
        <label>Nombre <span class="req">*</span></label>
        <input type="text" id="mNombre" />
      </div>
      <div class="form-field">
        <label>ID Equipo <span class="req">*</span></label>
        <input type="number" id="mEquipo" />
      </div>
      <div class="form-field">
        <label>Fecha Nacimiento <span class="req">*</span></label>
        <input type="date" id="mFecha" />
      </div>
      <div class="form-field">
        <label>Posición</label>
        <input type="text" id="mPosicion" />
      </div>
      <div class="form-field">
        <label>Dorsal</label>
        <input type="number" id="mDorsal" />
      </div>
      <div class="form-field">
        <label>Score</label>
        <input type="number" id="mScore" step="0.01" />
      </div>
      <div class="form-field">
        <label>Activo <span class="req">*</span></label>
        <select id="mActivo"><option value="true">Sí</option><option value="false">No</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline">Cancelar</button>
      <button class="btn btn-primary" onclick="ejecutarModificar()">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Guardar cambios
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg"></span></div>
<script src="JS/scriptJugador.js"></script>
</body>
</html>
