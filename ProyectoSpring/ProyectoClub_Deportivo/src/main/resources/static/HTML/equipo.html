<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos - La Liara Balompie</title>
    <link rel="stylesheet" href="../CSS/estiloEquipo.css">
</head>

<body>
    <div class="container">
        <h2>Equipos</h2>
        <div class="form-card">
            <div class="form-row">
                <div class="field">
                    <label for="inp-categoria">Categoria</label>
                    <input type="text" id="inp-categoria" placeholder="Categoria del equipo">
                </div>
                <div class="field">
                    <label for="inp-grupo">Grupo</label>
                    <input type="text" id="inp-grupo" placeholder="Grupo del equipo">
                </div>
                <button class="btn-buscar" id="btn-buscar" onclick="buscar()">Buscar</button>
            </div>
        </div>
        <button class="btn-action btn-eliminar" onclick="crearEquipo()">Crear</button>
        <div class="status-bar" id="status"></div>
   <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Descripción</th>
            <th>Categoria</th>
            <th>Grupo</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr class="empty-row">
            <td colspan="4">Realiza una búsqueda para ver resultados</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>


  <!-- Modal editar equipo -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-codigo">
      <div class="modal-header">
        <h3 id="modal-codigo">Modificar Equipo</h3>
        <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar">&#10005;</button>
      </div>
      <div class="modal-body">
       <div class="field">
          <label for="modal-inp-codigo">Código</label>
          <input type="text" id="modal-crear-codigo" placeholder="Escribe el código">
        </div>
        <div class="field">
          <label for="modal-inp-descripcion">Descripción</label>
          <input type="text" id="modal-crear-descripcion" placeholder="Escribe la descripcion">
        </div>
        <div class="field">
          <label for="modal-inp-categoria">Categoria</label>
          <input type="text" id="modal-crear-categoria" placeholder="Escribe la categoria">
        </div>
      </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-aceptar" onclick="guardarEdicion()">Aceptar</button>
      </div>
    </div>
  </div>


   <!-- Modal crear equipo -->
  <div class="modal-overlay" id="modal-overlay-crear">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-codigo">
      <div class="modal-header">
        <button class="modal-close" onclick="cerrarModalCrear()" aria-label="Cerrar">&#10005;</button>
      </div>
      <div class="modal-body">
        <p class="modal-meta" id="modal-meta"></p>
        <div class="field">
          <label for="modal-inp-codigo">Código</label>
          <input type="text" id="modal-crear-codigo" placeholder="Escribe el código">
        </div>
        <div class="field">
          <label for="modal-inp-descripcion">Descripción</label>
          <input type="text" id="modal-crear-descripcion" placeholder="Escribe la descripcion">
        </div>
        <div class="field">
          <label for="modal-inp-categoria">Categoria</label>
          <input type="text" id="modal-crear-categoria" placeholder="Escribe la categoria">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancelar" onclick="cerrarModalCrear()">Cancelar</button>
        <button class="btn-aceptar" onclick="guardarCrearEquipo()">Aceptar</button>
      </div>
    </div>
  </div>
        <script src="../JS/scriptEquipo.js"></script>
</body>

</html>
