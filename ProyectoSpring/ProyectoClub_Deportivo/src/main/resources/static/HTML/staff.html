<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staffs - La Liara Balompie</title>
    <link rel="stylesheet" href="../CSS/estiloStaff.css" />
</head>

<body>

    <nav>
        <div class="nav-logo-wrap" onclick="location.href='portada.html'" title="Inicio">
            <img class="club-logo" src="../img/logoLiara.png" alt="logo-liara" />
        </div>
        <span class="nav-sep"></span>
        <div class="nav-links">
            <a href="jugador.html">Jugadores</a>
            <a href="equipo.html">Equipos</a>
            <a href="staff.html" class="active">Staffs</a>
            <a href="partido.html">Partidos</a>
        </div>
        <div class="nav-right"></div>
    </nav>

    <main>
        <div class="page-header">
            <div>
                <h1>
                    <svg style="width:32px;height:32px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:8px"
                        viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    STAFFS
                </h1>
                <p>Administración del cuerpo técnico</p>
            </div>
            <button class="btn btn-primary admin-only" onclick="abrirModalCrear()">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Nuevo entrenador
            </button>
        </div>

        <div class="search-bar">
            <div class="field">
                <label>Nombre</label>
                <input type="text" id="busNombre" placeholder="Buscar por nombre..."
                    onkeydown="if(event.key==='Enter') buscar()" />
            </div>
            <div class="field">
                <label>Cargo</label>
                <input type="text" id="busCargo" placeholder="Entrenador..."
                    onkeydown="if(event.key==='Enter') buscar()" />
            </div>
            <button class="btn btn-primary" onclick="buscar()">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                Buscar
            </button>
            <button class="btn btn-outline" onclick="limpiar()">
                <svg viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
                Limpiar
            </button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cargo</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla">
                    <tr>
                        <td colspan="3">
                            <div class="empty-state">
                                <div class="icon"></div>
                                <p>Pulsa Buscar para cargar los staffs</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- MODAL CREAR -->
    <div class="modal-overlay" id="modalCrear">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModal('modalCrear')">✕</button>
            <h2>
                <svg style="width:20px;height:20px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:6px"
                    viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                NUEVO STAFF
            </h2>
            <div class="form-grid">
                <div class="form-field">
                    <label>Nombre <span class="req">*</span></label>
                    <input type="text" id="cNombre" placeholder="Nombre completo" />
                </div>
                <div class="form-field">
                    <label>Cargo</label>
                    <input type="text" id="cCargo" placeholder="Entrenador..." />
                </div>
                <div class="form-field"><label>Estado</label>
                    <select id="cEstado">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>

            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="cerrarModal('modalCrear')">Cancelar</button>
                <button class="btn btn-primary" onclick="insertar()">
                    <svg viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Crear staff
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL MODIFICAR -->
    <div class="modal-overlay" id="modalModificar">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModal('modalModificar')">✕</button>
            <h2>
                <svg style="width:20px;height:20px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:6px"
                    viewBox="0 0 24 24">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                MODIFICAR STAFF
            </h2>
            <input type="hidden" id="mId" />
            <div class="form-grid">
                <div class="form-grid">
                <div class="form-field">
                    <label>Nombre <span class="req">*</span></label>
                    <input type="text" id="mNombre" placeholder="Nombre completo" />
                </div>
                <div class="form-field">
                    <label>Cargo</label>
                    <input type="text" id="mCargo" placeholder="Entrenador..." />
                </div>
                <div class="form-field"><label>Estado</label>
                    <select id="mEstado">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="cerrarModal('modalModificar')">Cancelar</button>
                <button class="btn btn-primary" onclick="modificar()">
                    <svg viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Guardar cambios
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <div class="toast-dot"></div><span id="toastMsg"></span>
    </div>
</body>

</html>
