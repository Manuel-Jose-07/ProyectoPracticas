<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichas Medicas - La Liara Balompie</title>
    <link rel="stylesheet" href="../CSS/estiloFicha_medica.css">
</head>

<body>
    <div class="container">
        <h2>Fichas Médicas</h2>
        <div class="form-card">
            <div class="form-row">
                <div class="field">
                    <label for="inp-jugador">Jugador</label>
                    <input type="text" id="inp-jugador" placeholder="Nombre del jugador">
                </div>
                <div class="field">
                    <label for="inp-apto">Apto</label>
                    <input type="text" id="inp-apto" placeholder="Apto">
                </div>
                <button class="btn-buscar" id="btn-buscar" onclick="buscar()">Buscar</button>
            </div>
        </div>
        <button class="btn-action btn-eliminar" onclick="crearFichaMedica()">Crear</button>
        <div class="status-bar" id="status"></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Jugador</th>
                        <th>Código</th>
                        <th>Descripción</th>
                        <th>Grupo Sanguineo</th>
                        <th>Alergias</th>
                        <th>Apto</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <tr class="empty-row">
                        <td colspan="6">Realiza una búsqueda para ver resultados</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


    <!-- Modal editar ficha medica -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-ficha">
            <div class="modal-header">
                <h3 id="modal-ficha">Modificar Ficha Medica</h3>
                <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar">&#10005;</button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label for="modal-inp-jugador">Jugador</label>
                    <input type="text" id="modal-crear-Jugador" placeholder="Escribe el Jugador">
                </div>
                <div class="field">
                    <label for="modal-inp-codigo">Código</label>
                    <input type="text" id="modal-crear-codigo" placeholder="Escribe el código">
                </div>
                <div class="field">
                    <label for="modal-inp-descripcion">Descripción</label>
                    <input type="text" id="modal-crear-descripcion" placeholder="Escribe la descripcion">
                </div>
                <div class="field">
                    <label for="modal-inp-grupo_sanguineo">Grupo Sanguineo</label>
                    <input type="text" id="modal-crear-grupo_sanguineo" placeholder="Escribe el grupo sanguineo">
                </div>
                <div class="field">
                    <label for="modal-inp-alergias">Alergias</label>
                    <input type="text" id="modal-crear-alergias" placeholder="Escribe las alergias">
                </div>
                <div class="field">
                    <label for="modal-inp-apto">Apto</label>
                    <input type="text" id="modal-crear-apto" placeholder="Escribe si esta apto">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-aceptar" onclick="guardarEdicion()">Aceptar</button>
        </div>
    </div>
    </div>


    <!-- Modal crear ficha medica -->
    <div class="modal-overlay" id="modal-overlay-crear">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-ficha">
            <div class="modal-header">
                <button class="modal-close" onclick="cerrarModalCrear()" aria-label="Cerrar">&#10005;</button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label for="modal-inp-jugador">Jugador</label>
                    <input type="text" id="modal-crear-Jugador" placeholder="Escribe el Jugador">
                </div>
                <div class="field">
                    <label for="modal-inp-codigo">Código</label>
                    <input type="text" id="modal-crear-codigo" placeholder="Escribe el código">
                </div>
                <div class="field">
                    <label for="modal-inp-descripcion">Descripción</label>
                    <input type="text" id="modal-crear-descripcion" placeholder="Escribe la descripcion">
                </div>
                <div class="field">
                    <label for="modal-inp-grupo_sanguineo">Grupo Sanguineo</label>
                    <input type="text" id="modal-crear-grupo_sanguineo" placeholder="Escribe el grupo sanguineo">
                </div>
                <div class="field">
                    <label for="modal-inp-alergias">Alergias</label>
                    <input type="text" id="modal-crear-alergias" placeholder="Escribe las alergias">
                </div>
                <div class="field">
                    <label for="modal-inp-apto">Apto</label>
                    <input type="text" id="modal-crear-apto" placeholder="Escribe si esta apto">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-aceptar" onclick="guardarEdicion()">Aceptar</button>
            </div>
        </div>
    </div>
    <script src="../JS/scriptFicha_medica.js"></script>
</body>

</html>
