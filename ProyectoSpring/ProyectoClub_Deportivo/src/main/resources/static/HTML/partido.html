<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partidos — La Liara Balompie</title>
    <link rel="stylesheet" href="../CSS/estiloPartido.css" />
</head>

<body>

    <nav>
        <div class="nav-logo-wrap" title="Inicio">
            <img class="club-logo" src="../img/logoLiara.png" alt="logo-liara" />
        </div>
        <span class="nav-sep"></span>
        <div class="nav-links">
            <a href="jugador.html">Jugadores</a>
            <a href="equipo.html">Equipos</a>
            <a href="staff.html">Entrenadores</a>
            <a href="partido.html" class="active">Partidos</a>
        </div>
        <div class="nav-right"></div>
    </nav>

    <main>
        <div class="page-header">
            <div>
                <h1>
                    <svg style="width:32px;height:32px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:8px"
                        viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    PARTIDOS
                </h1>
                <p>Calendario y gestión de partidos</p>
            </div>
            <button class="btn btn-primary">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Nuevo partido
            </button>
        </div>

        <div class="search-bar">
            <div class="field">
                <label>Rival</label>
                <input type="text" id="busRival" placeholder="Nombre del equipo rival..." />
            </div>
            <div class="field">
                <label>Equipo</label>
                <input type="text" id="busEquipo" placeholder="Alevin A, Benjamin C..." />
            </div>
            <button class="btn btn-primary">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                Buscar
            </button>
            <button class="btn btn-outline">
                <svg viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
                Limpiar
            </button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Rival</th>
                        <th>Lugar</th>
                        <th>Resualtado</th>
                        <th>Equipo</th>
                        <th>Local</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla">
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="icon">📅</div>
                                <p>Pulsa Buscar para cargar los partidos</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- MODAL CREAR -->
    <div class="modal-overlay" id="modalCrear">
        <div class="modal">
            <button class="modal-close">✕</button>
            <h2>
                <svg style="width:20px;height:20px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:6px"
                    viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                NUEVO PARTIDO
            </h2>
            <div class="form-grid">
                <div class="form-field">
                    <label>Fecha <span class="req">*</span></label>
                    <input type="date" id="cFecha" />
                </div>
                <div class="form-field">
                    <label>Rival <span class="req">*</span></label>
                    <input type="text" id="cRival" placeholder="Nombre del rival" />
                </div>
                <div class="form-field full">
                    <label>Lugar</label>
                    <input type="text" id="cLugar" placeholder="Campo Municipal..." />
                </div>
                <div class="form-field full">
                    <label>Equipo <span class="req">*</span></label>
                    <select id="cEquipo"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="cerrarModal('modalCrear')">Cancelar</button>
                <button class="btn btn-primary" onclick="insertar()">
                    <svg viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Crear partido
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL MODIFICAR -->
    <div class="modal-overlay" id="modalModificar">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModal('modalModificar')">✕</button>
            <h2>
                <svg style="width:20px;height:20px;stroke:var(--primary);fill:none;stroke-width:2;vertical-align:middle;margin-right:6px"
                    viewBox="0 0 24 24">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                MODIFICAR PARTIDO
            </h2>
            <input type="hidden" id="mId" />
            <div class="form-grid">
                <div class="form-field">
                    <label>Fecha <span class="req">*</span></label>
                    <input type="date" id="mFecha" />
                </div>
                <div class="form-field">
                    <label>Rival <span class="req">*</span></label>
                    <input type="text" id="mRival" />
                </div>
                <div class="form-field full">
                    <label>Lugar</label>
                    <input type="text" id="mLugar" />
                </div>
                <div class="form-field full">
                    <label>Equipo <span class="req">*</span></label>
                    <select id="mEquipo"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="cerrarModal('modalModificar')">Cancelar</button>
                <button class="btn btn-primary" onclick="modificar()">
                    <svg viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Guardar cambios
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <div class="toast-dot"></div><span id="toastMsg"></span>
    </div>
</body>

</html>
